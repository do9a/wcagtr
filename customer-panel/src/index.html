<!doctype html>
<html lang="tr">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta
            name="description"
            content="WCAGTR - Erişilebilirlik İzleme Paneli"
        />
        <meta name="wcagtr-api-base" content="https://wcagtr.app/api/v1" />
        <title>WCAGTR - Customer Panel</title>

        <!-- Google Fonts: Plus Jakarta Sans + JetBrains Mono -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
            rel="stylesheet"
        />
        <link rel="preconnect" href="https://wcagtr.app" />

        <link rel="stylesheet" href="styles/base.css" />
        <link rel="stylesheet" href="styles/components.css" />
        <link rel="stylesheet" href="styles/views.css" />
    </head>
    <body>
        <!-- Loading Screen -->
        <div id="loading-screen" class="loading-screen" hidden>
            <div class="loading-spinner"></div>
            <p class="loading-text">Veriler yükleniyor...</p>
        </div>

        <!-- Toast Container -->
        <div
            class="toast-container"
            role="status"
            aria-live="polite"
            aria-atomic="true"
        ></div>

        <!-- Login View -->
        <div id="login-view" class="view-container" hidden>
            <div class="login-wrapper">
                <div class="login-brand">
                    <div class="brand-icon">
                        <svg
                            class="login-brand-logo"
                            viewBox="0 0 64 64"
                            fill="none"
                            xmlns="http://www.w3.org/2000/svg"
                            aria-hidden="true"
                        >
                            <circle
                                cx="32"
                                cy="32"
                                r="29"
                                style="
                                    fill: rgba(255, 107, 44, 0.12);
                                    stroke: var(--color-primary-dark);
                                "
                                stroke-width="3.5"
                            />
                            <circle
                                cx="32"
                                cy="20"
                                r="4.8"
                                style="fill: var(--color-primary-dark)"
                            />
                            <path
                                d="M20 30.5 L32 32 L44 30.5"
                                fill="none"
                                style="stroke: var(--color-primary-dark)"
                                stroke-width="4.5"
                                stroke-linecap="round"
                                stroke-linejoin="round"
                            />
                            <path
                                d="M32 33 L31 43"
                                fill="none"
                                style="stroke: var(--color-primary-dark)"
                                stroke-width="4.5"
                                stroke-linecap="round"
                                stroke-linejoin="round"
                            />
                            <path
                                d="M31 43 L25.5 55"
                                fill="none"
                                style="stroke: var(--color-primary-dark)"
                                stroke-width="4.5"
                                stroke-linecap="round"
                                stroke-linejoin="round"
                            />
                            <path
                                d="M31 43 L37.5 55"
                                fill="none"
                                style="stroke: var(--color-primary-dark)"
                                stroke-width="4.5"
                                stroke-linecap="round"
                                stroke-linejoin="round"
                            />
                        </svg>
                    </div>
                    <h1 class="brand-title">WCAGTR</h1>
                    <p class="brand-subtitle">Müşteri Paneli</p>
                </div>

                <form class="login-form" id="login-form" novalidate>
                    <div class="form-group">
                        <label for="customer-email" class="form-label"
                            >E-posta</label
                        >
                        <input
                            type="email"
                            id="customer-email"
                            name="email"
                            class="form-input"
                            autocomplete="email"
                            placeholder="ornek@sirket.com"
                            required
                            aria-describedby="email-error"
                        />
                        <span
                            id="email-error"
                            class="error-message"
                            role="alert"
                        ></span>
                    </div>

                    <div class="form-group">
                        <label for="customer-password" class="form-label"
                            >Şifre</label
                        >
                        <input
                            type="password"
                            id="customer-password"
                            name="password"
                            class="form-input"
                            autocomplete="current-password"
                            placeholder="••••••••"
                            required
                            aria-describedby="password-error"
                        />
                        <span
                            id="password-error"
                            class="error-message"
                            role="alert"
                        ></span>
                    </div>

                    <div
                        id="login-error"
                        class="form-error"
                        role="alert"
                        hidden
                    ></div>

                    <button
                        type="submit"
                        class="btn btn-primary"
                        id="login-button"
                        aria-busy="false"
                    >
                        <span class="btn-text">Giriş Yap</span>
                        <span class="btn-loader" hidden aria-hidden="true">
                            <svg class="spinner" viewBox="0 0 24 24">
                                <circle
                                    cx="12"
                                    cy="12"
                                    r="10"
                                    stroke="currentColor"
                                    stroke-width="3"
                                    fill="none"
                                    opacity="0.25"
                                />
                                <path
                                    d="M12 2a10 10 0 0 1 10 10"
                                    stroke="currentColor"
                                    stroke-width="3"
                                    fill="none"
                                />
                            </svg>
                        </span>
                    </button>
                </form>

                <div class="login-footer">
                    <div class="login-actions">
                        <a class="btn btn-secondary login-action-btn" href="mailto:support@wcagtr.com?subject=WCAGTR%20Kayıt%20Talebi">Kayıt Ol</a>
                        <a class="btn btn-secondary login-action-btn" href="https://wcagtr.com/giris/musteri">Giriş Yardımı</a>
                    </div>
                    <p class="footer-text">
                        Hesabınız yoksa kayıt talebi için bizimle iletişime geçin.
                    </p>
                </div>
            </div>
        </div>

        <!-- Dashboard View -->
        <div id="dashboard-view" class="view-container" hidden>
            <!-- Sidebar Navigation -->
            <nav class="sidebar" aria-label="Ana navigasyon">
                <div class="sidebar-header">
                    <div class="sidebar-brand">
                        <svg
                            viewBox="0 0 24 24"
                            fill="none"
                            xmlns="http://www.w3.org/2000/svg"
                            aria-hidden="true"
                            stroke="currentColor"
                            stroke-width="2"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                        >
                            <circle cx="20.8" cy="5.4" r="1" />
                            <path d="m23.2 24.4 1-6.5-5.8 1" />
                            <path d="m6.4 8.8 3-2.8 5.2 2.8-2.2 3.2" />
                            <path d="M5.8 19.5a6.4 6.4 0 0 0 8.9 8" />
                            <path d="M15 22.7a6.4 6.4 0 0 0-8.9-8" />
                        </svg>
                        <span class="brand-name">WCAGTR</span>
                    </div>
                </div>

                <ul class="nav-menu" role="menu">
                    <li role="none">
                        <a
                            href="#/"
                            class="nav-link active"
                            role="menuitem"
                            data-route="/"
                        >
                            <svg
                                class="nav-icon"
                                viewBox="0 0 24 24"
                                fill="none"
                                stroke="currentColor"
                                aria-hidden="true"
                            >
                                <rect width="7" height="9" x="3" y="3" rx="1" />
                                <rect width="7" height="5" x="14" y="3" rx="1" />
                                <rect width="7" height="9" x="14" y="12" rx="1" />
                                <rect width="7" height="5" x="3" y="16" rx="1" />
                            </svg>
                            <span class="nav-text">Dashboard</span>
                        </a>
                    </li>
                    <li role="none">
                        <a
                            href="#/scans"
                            class="nav-link"
                            role="menuitem"
                            data-route="/scans"
                        >
                            <svg
                                class="nav-icon"
                                viewBox="0 0 24 24"
                                fill="none"
                                stroke="currentColor"
                                aria-hidden="true"
                            >
                                <path d="m21 21-4.34-4.34" />
                                <circle cx="11" cy="11" r="8" />
                            </svg>
                            <span class="nav-text">Taramalar</span>
                        </a>
                    </li>
                    <li role="none">
                        <a
                            href="#/tokens"
                            class="nav-link"
                            role="menuitem"
                            data-route="/tokens"
                        >
                            <svg
                                class="nav-icon"
                                viewBox="0 0 24 24"
                                fill="none"
                                stroke="currentColor"
                                aria-hidden="true"
                            >
                                <path d="M2.586 17.414A2 2 0 0 0 2 18.828V21a1 1 0 0 0 1 1h3a1 1 0 0 0 1-1v-1a1 1 0 0 1 1-1h1a1 1 0 0 0 1-1v-1a1 1 0 0 1 1-1h.172a2 2 0 0 0 1.414-.586l.814-.814a6.5 6.5 0 1 0-4-4z" />
                                <circle cx="16.5" cy="7.5" r=".5" fill="currentColor" />
                            </svg>
                            <span class="nav-text">Tokenlar</span>
                        </a>
                    </li>
                    <li role="none">
                        <a
                            href="#/domains"
                            class="nav-link"
                            role="menuitem"
                            data-route="/domains"
                        >
                            <svg
                                class="nav-icon"
                                viewBox="0 0 24 24"
                                fill="none"
                                stroke="currentColor"
                                aria-hidden="true"
                            >
                                <circle cx="12" cy="12" r="10" />
                                <path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20" />
                                <path d="M2 12h20" />
                            </svg>
                            <span class="nav-text">Domainler</span>
                        </a>
                    </li>
                    <li role="none">
                        <a
                            href="#/billing"
                            class="nav-link"
                            role="menuitem"
                            data-route="/billing"
                        >
                            <svg
                                class="nav-icon"
                                viewBox="0 0 24 24"
                                fill="none"
                                stroke="currentColor"
                                aria-hidden="true"
                            >
                                <rect x="3" y="4" width="18" height="16" rx="2" />
                                <line x1="3" x2="21" y1="10" y2="10" />
                            </svg>
                            <span class="nav-text">Abonelik</span>
                        </a>
                    </li>
                    <li role="none">
                        <a
                            href="#/webhooks"
                            class="nav-link"
                            role="menuitem"
                            data-route="/webhooks"
                        >
                            <svg
                                class="nav-icon"
                                viewBox="0 0 24 24"
                                fill="none"
                                stroke="currentColor"
                                aria-hidden="true"
                            >
                                <path d="M18 16.98h-5.99c-1.1 0-1.95.94-2.48 1.9A4 4 0 0 1 2 17c.01-.7.2-1.4.57-2" />
                                <path d="m6 17 3.13-5.78c.53-.97.1-2.18-.5-3.1a4 4 0 1 1 6.89-4.06" />
                                <path d="m12 6 3.13 5.73C15.66 12.7 16.9 13 18 13a4 4 0 0 1 0 8" />
                            </svg>
                            <span class="nav-text">Webhooklar</span>
                        </a>
                    </li>
                </ul>

                <div class="sidebar-footer">
                    <div class="user-profile">
                        <div class="user-avatar" aria-hidden="true">
                            <span id="user-initials"></span>
                        </div>
                        <div class="user-info">
                            <p class="user-name" id="user-name">
                                Yükleniyor...
                            </p>
                            <p class="user-email" id="user-email"></p>
                        </div>
                    </div>
                    <button
                        class="btn-logout"
                        id="logout-button"
                        aria-label="Çıkış yap"
                    >
                        <svg
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            aria-hidden="true"
                        >
                            <path d="m16 17 5-5-5-5" />
                            <path d="M21 12H9" />
                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                        </svg>
                    </button>
                </div>
            </nav>

            <!-- Main Content -->
            <main class="main-content" id="app-content" role="main">
                <!-- Dynamic content loaded here -->
            </main>
        </div>

        <!-- Scripts -->
        <script type="module" src="auth.js"></script>
        <script type="module" src="api.js"></script>
        <script type="module" src="router.js"></script>
        <script type="module" src="components/dashboard.js"></script>
        <script type="module" src="components/scans.js"></script>
        <script type="module" src="components/scan-detail.js"></script>
        <script type="module" src="components/tokens.js"></script>
        <script type="module" src="components/domains.js"></script>
        <script type="module" src="components/billing.js"></script>
        <script type="module" src="components/webhooks.js"></script>
        <script type="module" src="app.js"></script>
    </body>
</html>
